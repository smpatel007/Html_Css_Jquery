<!DOCTYPE html>
<head>
    <title> Table Formate </title>
    <style>
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
        }
        th, td {
            padding: 5px;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <td>
                <p>This is paragraph</p>
                <p>This is another paragraph</p>
            </td>
            <td>
                This is table :
                <table>
                    <tr>
                        <td>A</td>
                        <td>B</td>
                    </tr>
                    <tr>
                        <td>C</td>
                        <td>D</td>
                    </tr>
                </table>
            </td>
        </tr>
        <tr>
            <td>
                This is call List
                <ul>
                    <li>Item 1</li>
                    <li>Item 2</li>
                    <li>Item 3</li>
                </ul>
            </td>
            <td>
                Hello
            </td>
        </tr>
    </table>
</body>

</html>
