<!DOCTYPE html>

<head>
    <title>Visible Heading</title>
    <link rel="stylesheet" href="mystyle.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
        integrity="sha384-4LISF5TTJX/fLmGSxO53rV4miRxdg84mZsxmO8Rx5jGtp/LbrixFETvWa5a6sESd" crossorigin="anonymous">

</head>

<body>

    <script>

        function removeElement() {
            document.getElementById("imgbox1").style.display = "none";
        }

        function changeVisibility() {
            document.getElementById("imgbox2").style.visibility = "hidden";
        }

        function resetElement() {
            document.getElementById("imgbox1").style.display = "block";
            document.getElementById("imgbox2").style.visibility = "visible";
        }
    </script>

    <h2>This is a Visible Heading</h2>
    <div class="row">
        <div id="imgbox1" class="column">
            <p>Display : None</p>
            <img src="./Images/coffee.jpg" alt="coffee" width="200" height="200"><br>
            <button id="rm" class="button" onclick="removeElement()">Remove &nbsp;<i class="bi bi-trash"></i></button>

        </div>

        <div id="imgbox2" class="column">
            <p>Visibility : Hidden</p>
            <img src="./Images/sound.jpg" alt="sound" width="200" height="200"><br>
            <button class="button" onclick="changeVisibility()">Hide &nbsp;<i class="bi bi-eye-slash"></i></button>
        </div>
        <div class="column">
            <p>Reset</p>
            <img src="./Images/workbench.jpg" alt="workbench" width="200" height="200"><br>
            <button class="button" onclick="resetElement()">Reset All &nbsp;<i
                    class="bi bi-arrow-repeat"></i></i></button>
        </div>
    </div>

    <br>

    <h1>The Mask-Image Property</h1>
    <h3>An Image With A Mask Layer Image:</h3>
    <div class="mask">
        <img src="Downloads/Solid_red.svg.png" alt="Red">
    </div>
    <div class="font">
        <h4 style="margin-left: 100px;margin-bottom: -50px;">THE</h4>
        <h1>BATMAN</h1>
    </div>
</body>

</html>
