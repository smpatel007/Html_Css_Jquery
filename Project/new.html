<!DOCTYPE html>

<head>
    <title>Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"></script>

    <style>
        body {
            font-family: Roboto, sans-serif;
            background-color: rgb(174, 211, 252);
        }

        .row {
            margin-top: 7%;
        }

        #left-side {
            height: 800px;
            background-color: #FFFFFF;
            border-radius: 15px 0 0 15px;
            margin-bottom: 0;
        }

        #right-side {
            height: 800px;
            background-color: #4835D4;
            border-radius: 0 15px 15px 0;
            margin-bottom: 0;
        }

        .container header {
            font-size: 30px;
            color: #4835D4;
            font-weight: 500;
            margin-right: 218px;
        }

        .container .form {
            margin-top: 30px;
        }

        .form .input-box {
            width: 100%;
            margin-top: 20px;
        }

        .input-box label {
            color: #333;
        }

        .form :where(.input-box input, .select-box) {
            position: relative;
            height: 50px;
            width: 100%;
            outline: none;
            font-size: 1rem;
            color: #707070;
            margin-top: 8px;
            margin-left: 20px;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 0 15px;            
        }

        .input-box input:focus {
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.1);
        }

        .form .column {
            display: flex;
            column-gap: 15px;
        }

        .form .gender-box {
            margin-top: 20px;
        }

        .gender-box h3 {
            color: #333;
            font-size: 1rem;
            font-weight: 400;
            margin-bottom: 8px;
        }

        .form :where(.gender-option, .gender) {
            display: flex;
            align-items: center;
            column-gap: 50px;
            flex-wrap: wrap;
        }

        .form .gender {
            column-gap: 5px;
        }

        .gender input {
            accent-color: rgb(130, 106, 251);
        }

        .form :where(.gender input, .gender label) {
            cursor: pointer;
        }

        .gender label {
            color: #707070;
        }

        .address :where(input, .select-box) {
            margin-top: 15px;
        }

        .select-box select {
            height: 100%;
            width: 100%;
            outline: none;
            border: none;
            color: #707070;
            font-size: 1rem;
        }

        .form button {
            height: 55px;
            width: 30%;
            color: #000;
            font-size: 1rem;
            font-weight: 400;
            margin-top: 30px;
            margin-right: 62%;
            border: 0;
            border-radius: 10px;
            cursor: pointer;
            background: #FFFFFF;
        }

        /* .form button:hover {
            background: rgb(88, 56, 250);
        } */

        .custom-control-label{
            margin-right: 90px;
            color: #fff;
        }

        /*Responsive*/
        @media screen and (max-width: 500px) {
            .form .column {
                flex-wrap: wrap;
            }

            .form :where(.gender-option, .gender) {
                row-gap: 15px;
            }
        }
    </style>
</head>

<body>
    <section>
        <div class="container">
            <div class="row">
                <div id="left-side" class="col-sm-6 jumbotron text-center">
                    <header>Gender Infomation</header>
                    <form action="#" class="form">
                        <div class="select-box">
                            <select>
                                <option hidden>Title</option>
                                <option>America</option>
                                <option>Japan</option>
                                <option>India</option>
                                <option>Nepal</option>
                            </select>
                        </div>
                        <div class="input-box address">
                            <div class="column">
                                <input type="text" placeholder="First Name" required />
                                <input type="text" placeholder="Last Name" required />
                            </div>
                        </div>
                        <br>
                        <div class="select-box">
                            <select>
                                <option hidden>Position</option>
                                <option>America</option>
                                <option>Japan</option>
                                <option>India</option>
                                <option>Nepal</option>
                            </select>
                        </div>
                        <div class="input-box address">
                            <input type="text" placeholder="Position" required />
                        </div>
                        <div class="input-box address">
                            <div class="column">
                                <input type="text" placeholder="Bussines Arena" required />
                                <div class="select-box">
                                    <select>
                                        <option hidden>Employess</option>
                                        <option>America</option>
                                        <option>Japan</option>
                                        <option>India</option>
                                        <option>Nepal</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div id="right-side" class="col-sm-6 jumbotron text-center">
                    <header style="color: #fff;">Contact Details</header>
                    <form action="#" class="form">
                        <div class="input-box address">
                            <input type="text" placeholder="Street + Nr" required />
                        </div>
                        <div class="input-box address">
                            <input type="text" placeholder="Additional Infomation" required />
                        </div>
                        <div class="input-box address">
                            <div class="column">
                                <input type="text" placeholder="Zip Code" required />
                                <input type="text" placeholder="Place" required />
                            </div>
                        </div>
                        <div class="input-box address">
                            <input type="text" placeholder="Country" required />
                        </div>
                        <div class="input-box address">
                            <div class="column">
                                <input type="text" placeholder="Code +" required />
                                <input type="text" placeholder="Phone Number" required />
                            </div>
                        </div>
                        <div class="input-box address">
                            <input type="text" placeholder="Your Email" required />
                        </div>
                        <br >                       
                        <div class="custom-control custom-checkbox">
                            <input type="checkbox" class="custom-control-input" id="customCheck1">
                            <label class="custom-control-label" for="customCheck1">I do accept the <u>Terms and Conditions</u> of Your site. </label>
                        </div>

                        <button>REGISTER</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
</body>
</head>

</html>
