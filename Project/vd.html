<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Time Toggle with YouTube</title>
    <style>
        #time-display {
            cursor: pointer;
            font-size: 18px;
            margin: 10px;
        }
    </style>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;

        // Initialize the YouTube Player
        function onYouTubeIframeAPIReady()
        {
            player = new YT.Player('inlineFrameExample', {
                events: {
                    onReady: onPlayerReady
                }
            });
        }

        function onPlayerReady(event)
        {
            const timeDisplay = document.getElementById('time-display');

            // Single click: Display total video time
            timeDisplay.addEventListener('click', () =>
            {
                const duration = player.getDuration();
                timeDisplay.textContent = formatTime(duration);
            });

            // Double click: Display remaining video time
            timeDisplay.addEventListener('dblclick', () =>
            {
                const currentTime = player.getCurrentTime();
                const duration = player.getDuration();
                const remainingTime = duration - currentTime;
                timeDisplay.textContent = formatTime(remainingTime);
            });
        }

        // Format time in mm:ss
        function formatTime(seconds)
        {
            const minutes = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
    </script>
</head>

<body>
    <!-- Embed YouTube Video -->
    <iframe id="inlineFrameExample" title="Inline Frame Example" width="640" height="360"
        src="https://www.youtube.com/embed/Q9OW4iaQl-k?enablejsapi=1" allowfullscreen>
    </iframe>
    <div id="time-display">00:00</div>
</body>

</html>
