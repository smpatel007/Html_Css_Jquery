<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Time Toggle with YouTube</title>
    <style>
        #time-display {
            cursor: pointer;
            font-size: 18px;
            margin: 10px;
        }
    </style>
</head>

<body>
    <iframe id="inlineFrameExample" title="Inline Frame Example" width="640" height="360"
        src="https://www.youtube.com/embed/Q9OW4iaQl-k" allowfullscreen>
    </iframe>
    <div id="time-display">00:00</div>

</body>

</html>
