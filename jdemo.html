<!DOCTYPE html>

<head>
    <title>
        JavaScript Demo
    </title>
    <style>
        table,
        th,
        td {
            border: 1px solid black;
            border-collapse: collapse;
        }
    
        th,
        td {
            padding: 5px;
        }
    </style>
</head>

<body>
    <div id="demo">
        <h2>The XMLHttpRequest Object</h2>
        <button type="button" onclick="loadoc()">Change Context</button>
    </div>

    <script>
        function loadoc() {
            const xhttp = new XMLHttpRequest();
            xhttp.onload = function () {
                document.getElementById("demo").innerHTML = this.responseText;
            };
            xhttp.open("GET", "ajax_info.txt");
            xhttp.send();
        }
    </script>

    <p>The getAllResponseHeaders() function returns all the header information of a resource, like length, server-type,
        content-type, last-modified, etc:</p>

    <p id="demo2"></p>

    <script>
        const xhttp = new XMLHttpRequest();
        xhttp.onload = function () {
            document.getElementById("demo2").innerHTML =
                this.getAllResponseHeaders();
        };
        xhttp.open("GET", "ajax_info.txt");
        xhttp.send();
    </script>

    <h2>Retrive data from XML File</h2>
    <p><b>Status : </b><span id="A1"></span></p>
    <p><b>Status Text : </b><span id="A2"></span></p>
    <p><b>Response : </b><span id="A3"></span></p>

    <button onclick="loaddata('note.xml')">Get XML Data</button>

    <script>
        function loaddata(url) {
            const xhttp = new XMLHttpRequest();
            xhttp.onload = function () {
                document.getElementById("A1").innerHTML = this.Status;
                document.getElementById("A2").innerHTML = this.statusText;
                document.getElementById("A3").innerHTML = this.responseText;
            };
            xhttp.open("GET", url);
            xhttp.send();
        }
    </script>
    <br><br>
    <button type="button" onclick="loadDoc()">Get my CD collection</button>
    <br><br>
    <table id="demo3"></table>

    <script>
        function loadDoc() {
            const xhttp = new XMLHttpRequest();
            xhttp.onload = function () {
                myFunction(this);
            }
            xhttp.open("GET", "cd_catalog.xml");
            xhttp.send();
        }
        function myFunction(xml) {
            const xmlDoc = xml.responseXML;
            const x = xmlDoc.getElementsByTagName("CD");
            let table = "<tr><th>Artist</th><th>Title</th></tr>";
            for (let i = 0; i < x.length; i++) {
                table += "<tr><td>" +
                    x[i].getElementsByTagName("ARTIST")[0].childNodes[0].nodeValue +
                    "</td><td>" +
                    x[i].getElementsByTagName("TITLE")[0].childNodes[0].nodeValue +
                    "</td></tr>";
            }
            document.getElementById("demo3").innerHTML = table;
        }
    </script>
</body>

</html>
